<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Priscilla</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Priscilla<span>.dev</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Sobre Mim</a></li>
            <li><a href="formacao.html">Formação</a></li>
            <li><a href="portfolio.html">Portfólio</a></li>
            <li><a href="contato.html" class="active">Contato</a></li>
        </ul>
        <button id="theme-toggle">🌓</button>
    </nav>

    <main class="container">
        <section id="contato">
            <h1>Entre em contato</h1>
            <p>Tem algum projeto em mente ou quer trocar uma ideia sobre Engenharia de Software? Envie uma mensagem!</p>

            <form id="formulario" class="formulario">
                <div class="form-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
                </div>

                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com">
                </div>

                <div class="form-group">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="Como posso te ajudar?"></textarea>
                </div>

                <button type="submit" id="submit-btn">Enviar Mensagem</button>
            </form>
            
            <div id="resultado-envio"></div>
        </section>
    </main>

    <script src="script/script.js"></script>
</body>
</html>
